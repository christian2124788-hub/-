<!DOCTYPE html>
<html lang="am" style="scroll-behavior: smooth;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የትምህርት ማዕከል - ወልድያ ቅድስት ሥላሴ</title>
    <style>
        :root {
            --primary-gold: #ffcc33;
            --secondary-blue: #00d4ff;
            --dark-deep: #080a0f;
            --glass-white: rgba(255, 255, 255, 0.03);
            --border-white: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Nyala", "Kefa", "Segoe UI", sans-serif;
            background-color: var(--dark-deep);
            color: #ffffff;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ህያው እና ተንቀሳቃሽ ዳራ (Animated Cosmic Background) */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1e26 0%, #080a0f 100%);
        }

        .glow-orb {
            position: fixed;
            width: 50vw;
            height: 50vw;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
            transition: all 1.5s ease;
        }

        #orb-gold { top: -10%; left: -10%; background: var(--primary-gold); }
        #orb-blue { bottom: -10%; right: -10%; background: var(--secondary-blue); }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header Design */
        header {
            text-align: center;
            padding: 100px 20px 60px;
            animation: fadeIn 1.2s ease-out;
        }

        header h1 {
            font-size: clamp(40px, 10vw, 70px);
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--primary-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        header p {
            font-size: 18px;
            color: #888;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Category Cards (ትንሣኤ እና ዕርገት) */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 80px;
        }

        .nav-card {
            background: var(--glass-white);
            border: 1px solid var(--border-white);
            padding: 50px 30px;
            border-radius: 30px;
            text-align: center;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
            text-decoration: none;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .nav-card:hover {
            transform: translateY(-15px) scale(1.02);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-card.res:hover { border-color: var(--primary-gold); box-shadow: 0 20px 50px rgba(255, 204, 51, 0.1); }
        .nav-card.asc:hover { border-color: var(--secondary-blue); box-shadow: 0 20px 50px rgba(0, 212, 255, 0.1); }

        .nav-card h2 { font-size: 35px; margin-bottom: 10px; }
        .nav-card i { font-style: normal; font-size: 40px; display: block; margin-bottom: 15px; }

        /* Quotes Sections */
        .teacher-section {
            margin-bottom: 100px;
            animation: slideUp 1s ease-out forwards;
        }

        .section-label {
            font-size: 24px;
            color: var(--primary-gold);
            margin-bottom: 30px;
            padding-left: 20px;
            border-left: 4px solid var(--primary-gold);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .quotes-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 15px;
        }

        .quote-box {
            background: var(--glass-white);
            border: 1px solid var(--border-white);
            padding: 25px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .quote-box:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }

        .quote-box p { font-size: 18px; color: #efefef; }

        .copy-tag {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--primary-gold);
            align-self: flex-end;
            margin-top: 15px;
            opacity: 0.4;
        }

        /* Toast UI */
        #toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            white-space: nowrap;
        }

        #toast.show { bottom: 40px; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(50px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        @media (max-width: 768px) {
            header { padding: 60px 20px; }
            .quotes-wrapper { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="glow-orb" id="orb-gold"></div>
    <div class="glow-orb" id="orb-blue"></div>

    <div id="toast">✨ በውብ ሁኔታ ተገልብጧል!</div>

    <div class="main-container">
        <header>
            <p>ወልድያ ቅድስት ሥላሴ</p>
            <h1>የጥበብ ማዕከል</h1>
        </header>

        <div class="nav-grid">
            <a href="#henok" class="nav-card res">
                <i>🌅</i>
                <h2>ትንሣኤ</h2>
                <p>የብርሃን ትምህርቶች</p>
            </a>
            <a href="#eyob" class="nav-card asc">
                <i>☁️</i>
                <h2>ዕርገት</h2>
                <p>የክብር ትምህርቶች</p>
            </a>
        </div>

        <section class="teacher-section" id="henok">
            <h2 class="section-label">ዲያቆን ሄኖክ ኃይሌ — ተስፋን ፍለጋ</h2>
            <div class="quotes-wrapper" id="henok-container"></div>
        </section>

        <section class="teacher-section" id="eyob" style="--label-color: var(--secondary-blue);">
            <h2 class="section-label" style="color: var(--secondary-blue); border-color: var(--secondary-blue);">መምህር እዮብ ይመኑ — የሕይወት ስንቅ</h2>
            <div class="quotes-wrapper" id="eyob-container"></div>
        </section>

        <footer style="text-align: center; padding: 60px 0; opacity: 0.3; font-size: 14px;">
            <p>© 2018 ወልድያ ቅድስት ሥላሴ — የተክለ ሥላሴ ትውልድ</p>
        </footer>
    </div>

    <script>
        const signature = `\n━━━━━━━━━━━━━━━━━━\n⛪ ተክለሥላሴ 2018 ወልድያ\n━━━━━━━━━━━━━━━━━━`;

        const henokQuotes = [
            "ተስፋ መቁረጥ ከኃጢአት ሁሉ ይከብዳል፤ ምክንያቱም ንስሐ እንዳንገባ ያደርገናል።",
            "እግዚአብሔር የጀመረውን ሳይጨርስ አይተውህም።",
            "ሰው ቢተውህ እግዚአብሔር አይተውህም።",
            "የወደቅህበት ቦታ ላይ አትቅረ፤ ተነስተህ ሩጥ።",
            "ትናንት ያለፈ ታሪክ ነው፤ ዛሬ የእግዚአብሔር ስጦታ ነው።",
            "ፈተና ለክብር ነው፤ መከራ ለበረከት ነው።",
            "ፀሎት የልብ በር መክፈቻ ነው።",
            "ለእግዚአብሔር የሚሳነው ነገር የለም።",
            "እምነት ማለት ጨለማው ውስጥ ብርሃኑን ማየት ነው።",
            "ትዕግስት የድል ሁሉ ቁልፍ ናት።",
            "ደስታህን በሰው ላይ አታድርግ፤ በፈጣሪህ ላይ እንጂ።",
            "ሕይወት በትግል ውስጥ ውበት አላት።",
            "እግዚአብሔር ካንተ ጋር ከሆነ ማን ይቃወምሃል?",
            "ዛሬ የጨለመብህ ነገ እንዲበራልህ ነው።",
            "ፍቅር የሁሉ መጀመሪያ ነው።",
            "ልብህን ለእግዚአብሔር ስጥ፤ እርሱ ይጠግነዋል።",
            "ምስጋና በረከትን ይጨምራል።",
            "ስህተትህን ለክብርህ ተጠቀምበት።",
            "የእግዚአብሔር ጊዜ ሁልጊዜ ትክክል ነው።",
            "ተስፋ የነፍስ መልሕቅ ናት。"
        ];

        const eyobQuotes = [
            "ሕይወትህን በእምነት ምራ፤ በስሜት አትመራ።",
            "ራስህን ዝቅ አድርግ፤ እግዚአብሔር ከፍ ያደርግሃል።",
            "የሰላም ምንጭ ንጹህ ሕሊና ነው።",
            "ጊዜህን በከንቱ አታባክን፤ ዕድሜህን እየኖርክ ነው።",
            "ሰው መሆን ትልቅ ክብር ነው።",
            "ሌሎችን ይቅር በል፤ አንተም ይቅር ትባላለህ።",
            "ትክክለኛ ስኬት ከፈጣሪ ጋር መሆን ነው።",
            "መከራ ካልመጣ ብርታት አይመጣም።",
            "መንፈሳዊነት ተግባር እንጂ ወሬ አይደለም።",
            "ለራስህ ሳይሆን ለሌሎች ኑር።",
            "ቅንነት የልብ ጌጥ ነው።",
            "ሁልጊዜ አመስጋኝ ሁን።",
            "ውስጣዊ ሰላም ከጸሎት ይገኛል።",
            "እግዚአብሔርን መፍራት የጥበብ መጀመሪያ ነው።",
            "ክፋትን በበጎነት አሸንፍ።",
            "የነፍስህ ዋጋ ከዓለም ይበልጣል።",
            "ሕይወት አጭር ናት፤ ለዘላለም ተዘጋጅ።",
            "ንጽህና ከውጪ ሳይሆን ከውስጥ ይጀምራል።",
            "እውነት ሁልጊዜ ታሸንፋለች።",
            "በረከት የሚገኘው በመስጠት ነው።"
        ];

        function initQuotes(data, containerId, color) {
            const container = document.getElementById(containerId);
            data.forEach(text => {
                const box = document.createElement('div');
                box.className = 'quote-box';
                box.innerHTML = `<p>${text}</p><span class="copy-tag" style="color:${color}">ንካውና ኮፒ አድርግ</span>`;
                
                box.onclick = () => {
                    const finalMsg = `« ${text} »` + signature;
                    navigator.clipboard.writeText(finalMsg).then(() => {
                        const toast = document.getElementById('toast');
                        toast.style.background = color;
                        toast.classList.add('show');
                        setTimeout(() => toast.classList.remove('show'), 2500);
                    });
                };
                container.appendChild(box);
            });
        }

        initQuotes(henokQuotes, 'henok-container', 'var(--primary-gold)');
        initQuotes(eyobQuotes, 'eyob-container', 'var(--secondary-blue)');

        // Scroll Effect for Background Orbs
        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            document.getElementById('orb-gold').style.transform = `translate(${scroll/5}px, ${scroll/10}px)`;
            document.getElementById('orb-blue').style.transform = `translate(-${scroll/5}px, -${scroll/10}px)`;
        });
    </script>
</body>
</html>
