<!doctype html>
<html lang="am" style="scroll-behavior: smooth">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>የጥበብ ማዕከል - ወልድያ ቅድስት ሥላሴ</title>

        <style>
            /* =========================================
           1. CSS VARIABLES (THEMING)
           ========================================= */
            :root {
                --primary-gold: #ffcc33;
                --secondary-blue: #00d4ff;
                --dark-deep: #05070a;
                --card-bg: rgba(255, 255, 255, 0.03);
                --border-color: rgba(255, 255, 255, 0.08);
                --text-bright: #ffffff;
                --text-muted: #a0a0a0;
                --accent-glow: rgba(255, 204, 51, 0.2);
                --transition: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            }

            /* =========================================
           2. GLOBAL RESET
           ========================================= */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                outline: none;
            }

            body {
                font-family: "Nyala", "Kefa", "Segoe UI", sans-serif;
                background-color: var(--dark-deep);
                color: var(--text-bright);
                overflow-x: hidden;
                line-height: 1.7;
                -webkit-font-smoothing: antialiased;
            }

            /* =========================================
           3. ANIMATED BACKGROUND ENGINE
           ========================================= */
            .cosmic-bg {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -2;
                background: radial-gradient(
                    circle at center,
                    #11141d 0%,
                    #05070a 100%
                );
            }

            .orb {
                position: fixed;
                width: 55vw;
                height: 55vw;
                border-radius: 50%;
                filter: blur(130px);
                opacity: 0.12;
                z-index: -1;
                pointer-events: none;
                transition: transform 1.2s ease-out;
            }

            #orb-1 {
                top: -15%;
                left: -10%;
                background: var(--primary-gold);
            }
            #orb-2 {
                bottom: -15%;
                right: -10%;
                background: var(--secondary-blue);
            }
            #orb-3 {
                top: 40%;
                left: 30%;
                width: 20vw;
                height: 20vw;
                background: #ffffff;
                opacity: 0.03;
            }

            /* =========================================
           4. STICKY NAVIGATION BAR
           ========================================= */
            .navigation-bar {
                position: sticky;
                top: 0;
                width: 100%;
                padding: 20px 0;
                z-index: 2000;
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border-bottom: 1px solid var(--border-color);
            }

            .nav-content {
                max-width: 1200px;
                margin: 0 auto;
                display: flex;
                justify-content: center;
                gap: 20px;
                padding: 0 20px;
            }

            .nav-btn {
                background: var(--card-bg);
                border: 1px solid var(--border-color);
                color: white;
                padding: 12px 28px;
                border-radius: 40px;
                text-decoration: none;
                font-weight: bold;
                font-size: 14px;
                transition: var(--transition);
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .nav-btn:hover {
                background: rgba(255, 255, 255, 0.1);
                border-color: var(--primary-gold);
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(255, 204, 51, 0.1);
            }

            /* =========================================
           5. HERO HEADER SECTION
           ========================================= */
            .main-header {
                text-align: center;
                padding: 100px 20px 60px;
                animation: fadeIn 1.8s ease;
            }

            .main-header p {
                font-size: 16px;
                letter-spacing: 6px;
                color: var(--text-muted);
                text-transform: uppercase;
                margin-bottom: 15px;
            }

            .main-header h1 {
                font-size: clamp(40px, 10vw, 80px);
                font-weight: 900;
                background: linear-gradient(
                    135deg,
                    #ffffff 20%,
                    var(--primary-gold) 50%,
                    var(--secondary-blue) 80%
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.1));
            }

            /* =========================================
           6. PORTAL ACCESS CARDS
           ========================================= */
            .portal-section {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
                gap: 30px;
                max-width: 1200px;
                margin: 0 auto 100px;
                padding: 0 25px;
            }

            .portal-card {
                background: linear-gradient(
                    160deg,
                    rgba(255, 255, 255, 0.06) 0%,
                    rgba(255, 255, 255, 0.01) 100%
                );
                border: 1px solid var(--border-color);
                border-radius: 40px;
                padding: 50px 30px;
                text-align: center;
                text-decoration: none;
                color: white;
                transition: var(--transition);
                position: relative;
                overflow: hidden;
            }

            .portal-card::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: radial-gradient(
                    circle at top right,
                    rgba(255, 255, 255, 0.05),
                    transparent
                );
                pointer-events: none;
            }

            .portal-card:hover {
                transform: translateY(-20px);
                border-color: rgba(255, 255, 255, 0.3);
                box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            }

            .portal-card i {
                font-size: 50px;
                display: block;
                margin-bottom: 25px;
            }
            .portal-card h2 {
                font-size: 30px;
                margin-bottom: 12px;
                font-weight: 800;
            }
            .portal-card p {
                color: var(--text-muted);
                font-size: 15px;
            }

            .mz-theme:hover {
                border-bottom: 6px solid var(--primary-gold);
            }
            .tw-theme:hover {
                border-bottom: 6px solid var(--secondary-blue);
            }

            /* =========================================
           7. TEACHER QUOTES GRID
           ========================================= */
            .content-container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 0 25px;
            }

            .section-header {
                font-size: 26px;
                color: var(--primary-gold);
                margin: 80px 0 40px;
                padding-left: 20px;
                border-left: 5px solid var(--primary-gold);
                font-weight: 800;
                display: flex;
                align-items: center;
                gap: 15px;
            }

            .quotes-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
                gap: 20px;
                margin-bottom: 60px;
            }

            .quote-item {
                background: var(--card-bg);
                border: 1px solid var(--border-color);
                padding: 35px;
                border-radius: 30px;
                cursor: pointer;
                transition: 0.4s ease;
                position: relative;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }

            .quote-item:hover {
                background: rgba(255, 255, 255, 0.08);
                transform: scale(1.03) rotate(1deg);
                border-color: rgba(255, 255, 255, 0.2);
            }

            .quote-item p {
                font-size: 20px;
                font-weight: 600;
                color: #efefef;
                margin-bottom: 20px;
            }

            .quote-item .copy-hint {
                font-size: 11px;
                font-weight: bold;
                text-transform: uppercase;
                letter-spacing: 2px;
                opacity: 0.5;
            }

            /* =========================================
           8. TOAST NOTIFICATION
           ========================================= */
            #toast-notice {
                position: fixed;
                bottom: -100px;
                left: 50%;
                transform: translateX(-50%);
                background: #ffffff;
                color: #000;
                padding: 18px 50px;
                border-radius: 100px;
                font-weight: 900;
                font-size: 16px;
                box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
                transition: 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
                z-index: 9999;
            }

            #toast-notice.active {
                bottom: 60px;
            }

            /* =========================================
           9. FOOTER & ANIMATIONS
           ========================================= */
            footer {
                text-align: center;
                padding: 100px 0 60px;
                opacity: 0.4;
                font-size: 13px;
                letter-spacing: 3px;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @media (max-width: 768px) {
                .nav-content {
                    gap: 10px;
                }
                .nav-btn {
                    padding: 10px 15px;
                    font-size: 12px;
                }
                .portal-section {
                    grid-template-columns: 1fr;
                }
                .quotes-grid {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>
        <div class="cosmic-bg"></div>
        <div class="orb" id="orb-1"></div>
        <div class="orb" id="orb-2"></div>
        <div class="orb" id="orb-3"></div>

        <div id="toast-notice">✨ ኮፒ ተደርጓል - ተክለሥላሴ 2018</div>

        <nav class="navigation-bar">
            <div class="nav-content">
                <a href="መዝሙር.html" class="nav-btn">📖 መዝሙር መጽሐፍ</a>
                <a href="ትምህርተወንጌል.html" class="nav-btn">⛪ ትምህርተ ወንጌል</a>
            </div>
        </nav>

        <div class="main-wrapper">
            <header class="main-header">
                <p>Woldia Holy Trinity</p>
                <h1>የጥበብ ማዕከል</h1>
            </header>

            <section class="portal-section">
                <a href="መዝሙር.html" class="portal-card mz-theme">
                    <i>📚</i>
                    <h2>የመዝሙር መጽሐፍ</h2>
                    <p>የተመረጡ የሥርዓተ አምልኮ መዝሙራት ስብስብ</p>
                </a>
                <a href="ትምህርተወንጌል.html" class="portal-card tw-theme">
                    <i>💡</i>
                    <h2>ትምህርተ ወንጌል</h2>
                    <p>የሕይወት ስንቅ የሚሆኑ መንፈሳዊ ትምህርቶች</p>
                </a>
            </section>

            <main class="content-container">
                <section id="henok-section">
                    <h2 class="section-header">ዲያቆን ሄኖክ ኃይሌ — ተስፋን ፍለጋ</h2>
                    <div class="quotes-grid" id="henok-container"></div>
                </section>

                <section id="eyob-section">
                    <h2
                        class="section-header"
                        style="
                            color: var(--secondary-blue);
                            border-color: var(--secondary-blue);
                        "
                    >
                        መምህር እዮብ ይመኑ — የሕይወት ስንቅ
                    </h2>
                    <div class="quotes-grid" id="eyob-container"></div>
                </section>
            </main>

            <footer>
                <p>© 2018 ወልድያ ቅድስት ሥላሴ — የተክለ ሥላሴ ትውልድ</p>
                <p style="margin-top: 10px; font-size: 10px">
                    ULTRAMODERN MEDIA ARCHIVE V5.0
                </p>
            </footer>
        </div>

        <script>
            // Data Integrity: Ensuring all text remains intact
            const signature = `\n━━━━━━━━━━━━━━━━━━\n⛪ ተክለሥላሴ 2018 ወልድያ\n━━━━━━━━━━━━━━━━━━`;

            const henokQuotes = [
                "ተስፋ መቁረጥ ከኃጢአት ሁሉ ይከብዳል፤ ምክንያቱም ንስሐ እንዳንገባ ያደርገናል።",
                "እግዚአብሔር የጀመረውን ሳይጨርስ አይተውህም።",
                "ሰው ቢተውህ እግዚአብሔር አይተውህም።",
                "የወደቅህበት ቦታ ላይ አትቅረ፤ ተነስተህ ሩጥ።",
                "ትናንት ያለፈ ታሪክ ነው፤ ዛሬ የእግዚአብሔር ስጦታ ነው።",
                "ፈተና ለክብር ነው፤ መከራ ለበረከት ነው።",
                "ፀሎት የልብ በር መክፈቻ ነው።",
                "ለእግዚአብሔር የሚሳነው ነገር የለም።",
                "እምነት ማለት ጨለማው ውስጥ ብርሃኑን ማየት ነው።",
                "ትዕግስት የድል ሁሉ ቁልፍ ናት።",
                "ደስታህን በሰው ላይ አታድርግ፤ በፈጣሪህ ላይ እንጂ።",
                "ሕይወት በትግል ውስጥ ውበት አላት።",
                "እግዚአብሔር ካንተ ጋር ከሆነ ማን ይቃወምሃል?",
                "ዛሬ የጨለመብህ ነገ እንዲበራልህ ነው።",
                "ፍቅር የሁሉ መጀመሪያ ነው።",
                "ልብህን ለእግዚአብሔር ስጥ፤ እርሱ ይጠግነዋል።",
                "ምስጋና በረከትን ይጨምራል።",
                "ስህተትህን ለክብርህ ተጠቀምበት።",
                "የእግዚአብሔር ጊዜ ሁልጊዜ ትክክል ነው።",
                "ተስፋ የነፍስ መልሕቅ ናት。",
            ];

            const eyobQuotes = [
                "ሕይወትህን በእምነት ምራ፤ በስሜት አትመራ።",
                "ራስህን ዝቅ አድርግ፤ እግዚአብሔር ከፍ ያደርግሃል።",
                "የሰላም ምንጭ ንጹህ ሕሊና ነው።",
                "ጊዜህን በከንቱ አታባክን፤ ዕድሜህን እየኖርክ ነው።",
                "ሰው መሆን ትልቅ ክብር ነው።",
                "ሌሎችን ይቅር በል፤ አንተም ይቅር ትባላለህ።",
                "ትክክለኛ ስኬት ከፈጣሪ ጋር መሆን ነው።",
                "መከራ ካልመጣ ብርታት አይመጣም።",
                "መንፈሳዊነት ተግባር እንጂ ወሬ አይደለም።",
                "ለራስህ ሳይሆን ለሌሎች ኑር።",
                "ቅንነት የልብ ጌጥ ነው።",
                "ሁልጊዜ አመስጋኝ ሁን።",
                "ውስጣዊ ሰላም ከጸሎት ይገኛል።",
                "እግዚአብሔርን መፍራት የጥበብ መጀመሪያ ነው።",
                "ክፋትን በበጎነት አሸንፍ።",
                "የነፍስህ ዋጋ ከዓለም ይበልጣል።",
                "ሕይወት አጭር ናት፤ ለዘላለም ተዘጋጅ።",
                "ንጽህና ከውጪ ሳይሆን ከውስጥ ይጀምራል።",
                "እውነት ሁልጊዜ ታሸንፋለች።",
                "በረከት የሚገኘው በመስጠት ነው።",
            ];

            /**
             * Renders quotes into their respective containers
             */
            function renderPortalContent(data, targetId, themeColor) {
                const container = document.getElementById(targetId);

                data.forEach((text, index) => {
                    const card = document.createElement("div");
                    card.className = "quote-item";

                    // Detailed HTML structure for each item
                    card.innerHTML = `
                    <p>« ${text} »</p>
                    <div class="copy-hint" style="color: ${themeColor}">
                        ክሊክ አድርገህ ኮፒ አድርግ
                    </div>
                `;

                    // Copy Action Logic
                    card.onclick = () => {
                        const fullText = `« ${text} »` + signature;
                        copyToClipboard(fullText, themeColor);
                    };

                    container.appendChild(card);
                });
            }

            /**
             * Enhanced Copy & Toast Notification System
             */
            function copyToClipboard(content, color) {
                navigator.clipboard
                    .writeText(content)
                    .then(() => {
                        const toast = document.getElementById("toast-notice");
                        toast.style.background =
                            color === "var(--primary-gold)"
                                ? "#ffcc33"
                                : "#00d4ff";
                        toast.style.color =
                            color === "var(--primary-gold)" ? "#000" : "#fff";

                        toast.classList.add("active");
                        setTimeout(
                            () => toast.classList.remove("active"),
                            2500,
                        );
                    })
                    .catch((err) => {
                        console.error("Copy failed: ", err);
                    });
            }

            // Initialize Rendering
            renderPortalContent(
                henokQuotes,
                "henok-container",
                "var(--primary-gold)",
            );
            renderPortalContent(
                eyobQuotes,
                "eyob-container",
                "var(--secondary-blue)",
            );

            /**
             * Parallax Background Movement
             */
            window.addEventListener("scroll", () => {
                const yOffset = window.pageYOffset;
                document.getElementById("orb-1").style.transform =
                    `translate(${yOffset / 8}px, ${yOffset / 15}px)`;
                document.getElementById("orb-2").style.transform =
                    `translate(-${yOffset / 8}px, -${yOffset / 15}px)`;
            });

            // Developer log
            console.log(
                "%c Portal V5.0 Active ",
                "color: #ffcc33; font-weight: bold; font-size: 14px;",
            );
        </script>
    </body>
</html>
