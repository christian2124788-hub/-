<!doctype html>
<html lang="am">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>አባልነት - ተክለሥላሴ ሰ/ት/ቤት</title>
        <style>
            :root {
                --gold: #cc7722;
                --dark-bg: #0b0e14;
            }

            body {
                margin: 0;
                font-family: "Segoe UI", "Kefa", "Nyala", sans-serif;
                background-color: var(--dark-bg);
                color: #ffffff;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                overflow-x: hidden;
            }

            .bg-animate {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: radial-gradient(
                    circle at 50% 50%,
                    rgba(204, 119, 34, 0.1) 0%,
                    transparent 80%
                );
                z-index: -1;
            }

            .form-card {
                background: rgba(255, 255, 255, 0.03);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(204, 119, 34, 0.2);
                border-radius: 25px;
                padding: 40px;
                width: 90%;
                max-width: 400px;
                box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
                animation: slideUp 0.8s ease-out;
            }

            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(40px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            h2 {
                color: var(--gold);
                text-align: center;
                margin-bottom: 10px;
            }
            p.subtitle {
                text-align: center;
                color: #888;
                font-size: 13px;
                margin-bottom: 30px;
            }

            .input-group {
                margin-bottom: 18px;
            }
            .input-group label {
                display: block;
                color: var(--gold);
                font-size: 13px;
                margin-bottom: 8px;
            }

            .input-group input,
            .input-group select {
                width: 100%;
                padding: 12px;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 10px;
                color: #fff;
                outline: none;
                transition: 0.3s;
                box-sizing: border-box;
            }

            .input-group input:focus {
                border-color: var(--gold);
                background: rgba(204, 119, 34, 0.05);
            }

            .btn-submit {
                width: 100%;
                padding: 15px;
                background: var(--gold);
                color: white;
                border: none;
                border-radius: 10px;
                font-weight: bold;
                cursor: pointer;
                transition: 0.3s;
            }

            .btn-submit:hover {
                transform: translateY(-3px);
                box-shadow: 0 10px 20px rgba(204, 119, 34, 0.3);
            }

            .admin-section {
                margin-top: 25px;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                padding-top: 15px;
            }

            .download-btn {
                background: transparent;
                color: #666;
                border: 1px dashed #444;
                width: 100%;
                padding: 10px;
                cursor: pointer;
                border-radius: 8px;
                font-size: 12px;
            }

            .download-btn:hover {
                color: var(--gold);
                border-color: var(--gold);
            }
        </style>
    </head>
    <body>
        <div class="bg-animate"></div>

        <div class="form-card">
            <h2>የአባልነት ፎርም</h2>
            <p class="subtitle">መረጃዎን በትክክል ይሙሉ</p>

            <form id="memberForm">
                <div class="input-group">
                    <label>ሙሉ ስም</label>
                    <input type="text" id="fullName" required />
                </div>
                <div class="input-group">
                    <label>የክርስትና ስም</label>
                    <input type="text" id="christianName" />
                </div>
                <div class="input-group">
                    <label>ስልክ ቁጥር</label>
                    <input type="tel" id="phone" required />
                </div>
                <div class="input-group">
                    <label>ክፍል/ዘርፍ</label>
                    <select id="dept">
                        <option>መዝሙር ክፍል</option>
                        <option>ትምህርት ክፍል</option>
                        <option>ልማት ክፍል</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">መዝግብ</button>
            </form>

            <div class="admin-section">
                <button class="download-btn" onclick="downloadCSV()">
                    ለ Access የሚሆን ፋይል አውርድ (CSV)
                </button>
            </div>
            <a
                href="index.html"
                style="
                    display: block;
                    text-align: center;
                    color: #444;
                    text-decoration: none;
                    margin-top: 15px;
                    font-size: 12px;
                "
                >← ተመለስ</a
            >
        </div>

        <script>
            // መረጃን መመዝገብ
            document
                .getElementById("memberForm")
                .addEventListener("submit", function (e) {
                    e.preventDefault();

                    const member = {
                        name: document.getElementById("fullName").value,
                        christian:
                            document.getElementById("christianName").value,
                        phone: document.getElementById("phone").value,
                        dept: document.getElementById("dept").value,
                    };

                    let members = JSON.parse(
                        localStorage.getItem("churchData") || "[]",
                    );
                    members.push(member);
                    localStorage.setItem("churchData", JSON.stringify(members));

                    alert("መረጃው ተመዝግቧል!");
                    this.reset();
                });

            // ወደ Access ለማስገባት ፋይል ማውረድ
            function downloadCSV() {
                let members = JSON.parse(
                    localStorage.getItem("churchData") || "[]",
                );
                if (members.length === 0) return alert("ምንም መረጃ አልተመዘገበም!");

                let csvContent =
                    "\uFEFFFull Name,Christian Name,Phone,Department\n" +
                    members
                        .map(
                            (m) =>
                                `"${m.name}","${m.christian}","${m.phone}","${m.dept}"`,
                        )
                        .join("\n");

                const blob = new Blob([csvContent], {
                    type: "text/csv;charset=utf-8;",
                });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.setAttribute("download", "ተክለሥላሴ_አባላት.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        </script>
    </body>
</html>
