<!doctype html>
<html lang="am">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>መዝሙራት እና ጥራዞች - ወልድያ ቅድስት ሥላሴ</title>
        <style>
            :root {
                --primary-red: #390f0f;
                --gold-accent: #cc7722;
                --bg-dark: #0b0e14;
                --transition-slow: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            }

            body {
                margin: 0;
                font-family: "Segoe UI", "Nyala", "Kefa", sans-serif;
                background-color: var(--bg-dark);
                color: #ffffff;
                line-height: 1.6;
                overflow-x: hidden;
                opacity: 0;
                animation: pageFadeIn 1s ease-out forwards;
            }

            @keyframes pageFadeIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .container {
                max-width: 1100px;
                margin: 0 auto;
                padding: 40px 20px;
                position: relative;
                z-index: 1;
            }

            header {
                text-align: center;
                padding: 60px 0;
                background: linear-gradient(
                    to bottom,
                    var(--primary-red),
                    transparent
                );
                border-bottom: 2px solid var(--gold-accent);
                margin-bottom: 50px;
                border-radius: 0 0 20px 20px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            }

            header h1 {
                color: var(--gold-accent);
                font-size: 38px;
                margin: 0;
                text-shadow: 0 0 15px rgba(204, 119, 34, 0.3);
            }

            header p {
                margin: 10px 0 0;
                color: #aaa;
                font-size: 16px;
            }

            .pdf-section {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 20px;
            }

            .file-card {
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid rgba(204, 119, 34, 0.15);
                border-radius: 15px;
                padding: 20px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                cursor: pointer;
                backdrop-filter: blur(10px);
                transition: var(--transition-slow);
                opacity: 0;
            }

            .file-card:hover {
                background: rgba(57, 15, 15, 0.5);
                border-color: var(--gold-accent);
                transform: translateY(-8px);
                box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
            }

            .file-info {
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .file-icon {
                font-size: 28px;
            }

            .file-name {
                font-size: 15px;
                font-weight: 500;
                color: #eee;
            }

            .download-link {
                text-decoration: none;
                background: transparent;
                border: 1px solid var(--gold-accent);
                color: var(--gold-accent);
                padding: 6px 14px;
                border-radius: 6px;
                font-size: 13px;
                transition: 0.3s;
                font-weight: bold;
            }

            .download-link:hover {
                background: var(--gold-accent);
                color: #fff;
            }

            #toast {
                visibility: hidden;
                position: fixed;
                bottom: 40px;
                left: 50%;
                transform: translateX(-50%);
                background: var(--gold-accent);
                color: #fff;
                padding: 12px 30px;
                border-radius: 50px;
                font-weight: bold;
                z-index: 2000;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            }

            #toast.show {
                visibility: visible;
                animation: fadeInUp 0.4s ease-out;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>የመዝሙር ጥራዞች ማከማቻ</h1>
            <p>ለመገልበጥ ካርዱን፣ ለማውረድ "አውርድ" የሚለውን ይንኩ</p>
        </header>

        <div class="container">
            <div id="toast">የርዕስ መረጃው ተገልብጧል!</div>

            <div class="pdf-section">
                <div
                    class="file-card"
                    onclick="copyTitle('ዘአንቀፀ ብርሃን መዝሙር ጥራዝ')"
                >
                    <div class="file-info">
                        <span class="file-icon">📚</span>
                        <span class="file-name">ዘአንቀፀ ብርሃን ጥራዝ</span>
                    </div>
                    <a
                        href="መዝሙር_ጥራዝ_ዘአንቀፀ_ብርሃን_ሰንበት_ትምህርት_ቤት.pdf"
                        download
                        class="download-link"
                        >አውርድ</a
                    >
                </div>

                <div class="file-card" onclick="copyTitle('የጥምቀት መዝሙራት')">
                    <div class="file-info">
                        <span class="file-icon">💧</span>
                        <span class="file-name">የጥምቀት መዝሙራት</span>
                    </div>
                    <a href="የጥምቀት መዝሙራት.pdf" download class="download-link"
                        >አውርድ</a
                    >
                </div>

                <div class="file-card" onclick="copyTitle('ቃና መዝሙር')">
                    <div class="file-info">
                        <span class="file-icon">📕</span>
                        <span class="file-name">ቃና መዝሙር</span>
                    </div>
                    <a href="ቃና መዝሙር.pdf" download class="download-link"
                        >አውርድ</a
                    >
                </div>

                <div class="file-card" onclick="copyTitle('ጥምቀት መዝሙር')">
                    <div class="file-info">
                        <span class="file-icon">✨</span>
                        <span class="file-name">ጥምቀት መዝሙር</span>
                    </div>
                    <a href="ጥምቀት መዝሙር.pdf" download class="download-link"
                        >አውርድ</a
                    >
                </div>

                <div class="file-card" onclick="copyTitle('የጥምቀት መዝሙራት 2')">
                    <div class="file-info">
                        <span class="file-icon">❄️</span>
                        <span class="file-name">የጥምቀት መዝሙራት 2</span>
                    </div>
                    <a href="የጥምቀት መዝሙራት2.pdf" download class="download-link"
                        >አውርድ</a
                    >
                </div>

                <div class="file-card" onclick="copyTitle('የቅዱስ ገብርኤል መዝሙራት')">
                    <div class="file-info">
                        <span class="file-icon">🛡️</span>
                        <span class="file-name">የቅዱስ ገብርኤል መዝሙራት</span>
                    </div>
                    <a
                        href="የቅዱስ ገብርኤል መዝሙራት.pdf"
                        download
                        class="download-link"
                        >አውርድ</a
                    >
                </div>

                <div class="file-card" onclick="copyTitle('የመስቀል መዝሙር')">
                    <div class="file-info">
                        <span class="file-icon">✟</span>
                        <span class="file-name">የመስቀል መዝሙር</span>
                    </div>
                    <a href="የመስቀል መዝሙር.pdf" download class="download-link"
                        >አውርድ</a
                    >
                </div>

                <div class="file-card" onclick="copyTitle('የመድኃኔአለም መዝሙር ጥራዝ')">
                    <div class="file-info">
                        <span class="file-icon">🔱</span>
                        <span class="file-name">የመድኃኔአለም መዝሙር ጥራዝ</span>
                    </div>
                    <a
                        href="የመድኃኔአለም መዝሙር_ጥራዝ[1][1].pdf"
                        download
                        class="download-link"
                        >አውርድ</a
                    >
                </div>
            </div>
        </div>

        <script>
            const signature = `\n━━━━━━━━━━━━━━━━━━\n   ⛪ ተክለሥላሴ 2018 ወልድያ\n━━━━━━━━━━━━━━━━━━`;

            function copyTitle(cleanName) {
                const copyText = `መዝሙር ጥራዝ፦ ${cleanName}${signature}`;
                navigator.clipboard.writeText(copyText).then(() => {
                    const toast = document.getElementById("toast");
                    toast.className = "show";
                    setTimeout(() => {
                        toast.className = "";
                    }, 3000);
                });
            }

            document.addEventListener("DOMContentLoaded", () => {
                const cards = document.querySelectorAll(".file-card");
                cards.forEach((card, index) => {
                    setTimeout(() => {
                        card.style.animation =
                            "fadeInUp 0.6s ease-out forwards";
                    }, index * 80);
                });
            });
        </script>
    </body>
</html>
