<!doctype html>

<html lang="am">
    <head>
        <meta charset="UTF-8" />

        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />

        <meta name="theme-color" content="#110000" />

        <title>ተክለሥላሴ-የጉባኤ መዝሙራት ጥናት</title>

        <!-- Fonts & Icons -->

        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@400;700;900&family=Noto+Sans+Ethiopic:wght@300;400;700&display=swap"
            rel="stylesheet"
        />

        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        />

        <style>
            /* =========================================

           1. CSS VARIABLES & COLOR PALETTE

           ========================================= */

            :root {
                --maroon-deep: #0a0000;

                --maroon-bright: #2a0101;

                --gold: #d4af37;

                --gold-bright: #ffdf73;

                --gold-glow: rgba(212, 175, 55, 0.6);

                --text-main: #f4e4bc;

                --text-muted: rgba(244, 228, 188, 0.6);

                --glass-bg: rgba(20, 0, 0, 0.55);

                --border-glass: rgba(212, 175, 55, 0.2);

                --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            }

            * {
                margin: 0;

                padding: 0;

                box-sizing: border-box;

                -webkit-tap-highlight-color: transparent;
            }

            html {
                scroll-behavior: smooth;
            }

            body {
                background-color: var(--maroon-deep);

                color: var(--text-main);

                font-family: "Noto Sans Ethiopic", sans-serif;

                overflow-x: hidden;

                min-height: 100vh;

                display: flex;

                flex-direction: column;
            }

            /* -----------------------------------------

           BACKGROUND PARTICLES

           ----------------------------------------- */

            #heavenlyParticles {
                position: fixed;

                top: 0;

                left: 0;

                width: 100vw;

                height: 100vh;

                z-index: -1;

                pointer-events: none;

                background: radial-gradient(
                    circle at 50% 0%,

                    var(--maroon-bright) 0%,

                    var(--maroon-deep) 80%
                );
            }

            /* Custom Scrollbar */

            ::-webkit-scrollbar {
                width: 6px;
            }

            ::-webkit-scrollbar-track {
                background: transparent;
            }

            ::-webkit-scrollbar-thumb {
                background: rgba(212, 175, 55, 0.4);

                border-radius: 10px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: var(--gold);
            }

            /* =========================================

           2. HEADER, LOGO & SEARCH

           ========================================= */

            header {
                padding: 8vh 20px 3vh;

                text-align: center;

                animation: fadeInDown 1s ease-out;
            }

            .logo-box {
                position: relative;

                display: inline-flex;

                justify-content: center;

                align-items: center;

                width: 140px;

                height: 140px;

                margin-bottom: 1.5rem;

                border-radius: 50%;

                background: rgba(212, 175, 55, 0.03);

                box-shadow:
                    0 0 30px rgba(212, 175, 55, 0.15),
                    inset 0 0 20px rgba(212, 175, 55, 0.05);

                border: 2px solid var(--border-glass);

                animation: floatLogo 6s ease-in-out infinite;

                z-index: 2;
            }

            .logo-box::before {
                content: "";

                position: absolute;

                top: -5px;
                left: -5px;
                right: -5px;
                bottom: -5px;

                border-radius: 50%;

                border: 2px dashed rgba(212, 175, 55, 0.4);

                animation: spin 20s linear infinite;

                pointer-events: none;
            }

            .logo-box::after {
                content: "";

                position: absolute;

                width: 100%;

                height: 100%;

                border-radius: 50%;

                box-shadow: 0 0 50px var(--gold-glow);

                opacity: 0.5;

                animation: pulseGlow 3s ease-in-out infinite alternate;

                z-index: -1;
            }

            .main-logo {
                width: 85%;

                height: 85%;

                object-fit: contain;

                border-radius: 50%;

                filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.5));

                z-index: 3;
            }

            header h1 {
                font-family: "Noto Serif Ethiopic", serif;

                font-size: clamp(2rem, 5vw, 3.5rem);

                font-weight: 900;

                background: linear-gradient(
                    135deg,
                    #ffffff 0%,

                    var(--gold-bright) 50%,

                    #e6c27a 100%
                );

                -webkit-background-clip: text;

                -webkit-text-fill-color: transparent;

                letter-spacing: 1px;

                margin-bottom: 0.5rem;

                filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.8));
            }

            .subtitle {
                font-size: 0.9rem;

                letter-spacing: 5px;

                color: var(--gold);

                text-transform: uppercase;

                font-weight: 700;

                opacity: 0.9;

                text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            }

            .search-area {
                max-width: 650px;

                margin: 0 auto 3rem;

                position: sticky;

                top: 20px;

                z-index: 100;

                padding: 0 20px;

                width: 100%;
            }

            .search-wrapper {
                position: relative;

                background: rgba(10, 0, 0, 0.75);

                backdrop-filter: blur(20px);

                -webkit-backdrop-filter: blur(20px);

                border: 1px solid rgba(212, 175, 55, 0.3);

                border-radius: 40px;

                overflow: hidden;

                box-shadow:
                    0 15px 35px rgba(0, 0, 0, 0.6),
                    inset 0 0 15px rgba(212, 175, 55, 0.05);

                transition: var(--transition);
            }

            .search-wrapper:focus-within {
                border-color: var(--gold-bright);

                box-shadow:
                    0 15px 45px rgba(0, 0, 0, 0.9),
                    0 0 25px rgba(212, 175, 55, 0.3);

                transform: translateY(-3px);
            }

            .search-wrapper i {
                position: absolute;

                left: 25px;

                top: 50%;

                transform: translateY(-50%);

                color: var(--gold);

                font-size: 1.2rem;
            }

            .search-input {
                width: 100%;

                background: transparent;

                border: none;

                padding: 20px 25px 20px 60px;

                color: #fff;

                font-size: 1.15rem;

                outline: none;

                font-family: "Noto Sans Ethiopic", sans-serif;
            }

            .search-input::placeholder {
                color: var(--text-muted);

                font-weight: 300;
            }

            /* =========================================

           3. HYMN CARDS

           ========================================= */

            main {
                flex-grow: 1;
            }

            .hymn-grid {
                max-width: 850px;

                margin: 0 auto;

                padding: 0 20px 6vh;

                width: 100%;
            }

            .no-results {
                text-align: center;

                padding: 4rem 2rem;

                color: var(--text-muted);

                font-size: 1.3rem;

                display: none;

                background: var(--glass-bg);

                border-radius: 20px;

                border: 1px dashed var(--border-glass);

                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            }

            .hymn-card {
                background: var(--glass-bg);

                backdrop-filter: blur(15px);

                -webkit-backdrop-filter: blur(15px);

                border: 1px solid var(--border-glass);

                border-radius: 20px;

                margin-bottom: 25px;

                overflow: hidden;

                transition: var(--transition);

                opacity: 0;

                transform: translateY(20px);

                animation: cardReveal 0.6s ease-out forwards;

                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            }

            .hymn-card:hover {
                border-color: rgba(212, 175, 55, 0.5);

                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);

                transform: translateY(-2px);
            }

            .hymn-header {
                padding: 22px 30px;

                cursor: pointer;

                display: flex;

                justify-content: space-between;

                align-items: center;

                background: linear-gradient(
                    90deg,
                    rgba(212, 175, 55, 0.05) 0%,

                    transparent 100%
                );
            }

            .hymn-info h3 {
                font-family: "Noto Serif Ethiopic", serif;

                font-size: 1.4rem;

                color: var(--gold-bright);

                margin-top: 8px;

                font-weight: 700;

                text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            }

            .hymn-type {
                font-size: 0.8rem;

                color: var(--gold-bright);

                background: rgba(212, 175, 55, 0.1);

                padding: 5px 15px;

                border-radius: 20px;

                letter-spacing: 1px;

                border: 1px solid var(--border-glass);

                display: inline-block;

                font-weight: bold;
            }

            .toggle-icon {
                width: 40px;

                height: 40px;

                border-radius: 50%;

                background: rgba(255, 255, 255, 0.05);

                display: flex;

                align-items: center;

                justify-content: center;

                color: var(--gold);

                transition: var(--transition);

                border: 1px solid rgba(255, 255, 255, 0.05);
            }

            .hymn-card.active .toggle-icon {
                background: var(--gold);

                color: var(--maroon-deep);

                transform: rotate(180deg);

                box-shadow: 0 0 15px var(--gold-glow);
            }

            .hymn-card.active {
                border-color: var(--gold);
            }

            /* =========================================

           4. LYRICS & TELEPROMPTER

           ========================================= */

            .lyrics-section {
                max-height: 0;

                overflow: hidden;

                transition: max-height 0.8s cubic-bezier(0.25, 1, 0.5, 1);

                background: rgba(0, 0, 0, 0.6);

                position: relative;
            }

            .hymn-card.active .lyrics-section {
                max-height: 3500px;
            }

            .teleprompter-controls {
                display: flex;

                justify-content: center;

                gap: 15px;

                padding: 18px;

                border-bottom: 1px solid var(--border-glass);

                background: rgba(0, 0, 0, 0.4);
            }

            .control-btn {
                background: rgba(255, 255, 255, 0.05);

                border: 1px solid var(--border-glass);

                color: var(--text-main);

                padding: 10px 22px;

                border-radius: 25px;

                cursor: pointer;

                font-size: 0.95rem;

                font-family: "Noto Sans Ethiopic", sans-serif;

                display: flex;

                align-items: center;

                gap: 8px;

                transition: var(--transition);
            }

            .control-btn:hover {
                background: rgba(212, 175, 55, 0.2);

                color: var(--gold-bright);

                border-color: rgba(212, 175, 55, 0.4);
            }

            .control-btn.active {
                background: var(--gold);

                color: var(--maroon-deep);

                border-color: var(--gold);

                font-weight: bold;

                box-shadow: 0 0 15px var(--gold-glow);
            }

            .lyrics-viewport {
                padding: 50px 20px;

                text-align: center;

                font-size: 1.8rem;

                line-height: 2.2;

                font-weight: 700;

                height: 400px;

                overflow-y: auto;

                scroll-behavior: smooth;

                position: relative;

                mask-image: linear-gradient(
                    to bottom,

                    transparent,
                    black 15%,

                    black 85%,

                    transparent
                );

                -webkit-mask-image: linear-gradient(
                    to bottom,

                    transparent,
                    black 15%,

                    black 85%,

                    transparent
                );
            }

            .lyrics-viewport p {
                margin-bottom: 25px;

                opacity: 0.3;

                transition: all 0.4s ease;

                transform: scale(0.95);

                cursor: pointer;
            }

            .lyrics-viewport p.active-line {
                opacity: 1;

                color: var(--gold-bright);

                transform: scale(1.05);

                text-shadow: 0 0 25px rgba(255, 223, 115, 0.4);
            }

            /* =========================================

           5. FOOTER & ANIMATIONS

           ========================================= */

            footer {
                text-align: center;

                padding: 35px;

                border-top: 1px solid var(--border-glass);

                font-size: 0.9rem;

                color: var(--text-muted);

                background: rgba(0, 0, 0, 0.5);

                backdrop-filter: blur(10px);
            }

            @keyframes floatLogo {
                0%,
                100% {
                    transform: translateY(0);
                }

                50% {
                    transform: translateY(-12px);
                }
            }

            @keyframes spin {
                100% {
                    transform: rotate(360deg);
                }
            }

            @keyframes pulseGlow {
                0% {
                    opacity: 0.3;
                    transform: scale(0.95);
                }

                100% {
                    opacity: 0.7;
                    transform: scale(1.05);
                }
            }

            @keyframes fadeInDown {
                from {
                    opacity: 0;
                    transform: translateY(-20px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes cardReveal {
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @media (max-width: 600px) {
                .logo-box {
                    width: 110px;
                    height: 110px;
                }

                .lyrics-viewport {
                    font-size: 1.5rem;

                    height: 350px;

                    padding: 40px 15px;
                }

                .hymn-header {
                    padding: 18px 22px;
                }

                header h1 {
                    font-size: 2rem;
                }

                .search-input {
                    padding: 18px 20px 18px 55px;

                    font-size: 1.05rem;
                }
            }
        </style>
    </head>

    <body>
        <canvas id="heavenlyParticles"></canvas>

        <header>

        <script>
            /* =========================================

           1. PARTICLES ENGINE (Optimized)

           ========================================= */

            const canvas = document.getElementById("heavenlyParticles");

            const ctx = canvas.getContext("2d");

            let particlesArray = [];

            function setupCanvas() {
                canvas.width = window.innerWidth;

                canvas.height = window.innerHeight;
            }

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;

                    this.y = Math.random() * canvas.height;

                    this.size = Math.random() * 2 + 0.5;

                    this.speedY = Math.random() * -0.5 - 0.2;

                    this.opacity = Math.random() * 0.5 + 0.1;

                    this.speedX = (Math.random() - 0.5) * 0.3;
                }

                update() {
                    this.y += this.speedY;

                    this.x += this.speedX;

                    if (this.y < 0) {
                        this.y = canvas.height;

                        this.x = Math.random() * canvas.width;
                    }

                    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                }

                draw() {
                    ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`;

                    ctx.beginPath();

                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);

                    ctx.fill();
                }
            }

            function initParticles() {
                particlesArray = [];

                let numberOfParticles = Math.min(
                    (canvas.width * canvas.height) / 9000,

                    120,
                );

                for (let i = 0; i < numberOfParticles; i++) {
                    particlesArray.push(new Particle());
                }
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particlesArray.forEach((p) => {
                    p.update();

                    p.draw();
                });

                requestAnimationFrame(animateParticles);
            }

            window.addEventListener("resize", () => {
                setupCanvas();

                initParticles();
            });

            setupCanvas();

            initParticles();

            animateParticles();

            /* =========================================

           ========================================= */

                    lyrics: [

                },

                // --- አዳዲስ የተጨመሩ መዝሙሮች ይጀምራሉ ---

                {

                        "እኔንም ጎበኘኝ በማዳኑ ጥሪ",

                    ],
                },

            function renderHymns(data) {
                const container = document.getElementById("hymnContainer");

                container.innerHTML = data

                    .map(
                        (hymn, index) => `

                <article class="hymn-card" data-id="${hymn.id}" style="animation-delay: ${index * 0.05}s">

                    <div class="hymn-header" onclick="toggleHymn(this)">

                        <div class="hymn-info">

                            <span class="hymn-type"><i class="fas fa-cross"></i> ${hymn.category}</span>

                            <h3>${hymn.title}</h3>

                        </div>

                        <div class="toggle-icon"><i class="fas fa-chevron-down"></i></div>

                    </div>

                    <div class="lyrics-section">

                        <div class="teleprompter-controls">

                            <button class="control-btn play-btn" onclick="toggleScroll(this)"><i class="fas fa-play"></i> አጫውት</button>

                            <button class="control-btn" onclick="adjustFont(this, 2)"><i class="fas fa-plus"></i></button>

                            <button class="control-btn" onclick="adjustFont(this, -2)"><i class="fas fa-minus"></i></button>

                        </div>

                        <div class="lyrics-viewport" onscroll="highlightActiveLyric(this)">

                            ${hymn.lyrics.map((line) => `<p onclick="jumpToLine(this)">${line}</p>`).join("")}

                        </div>

                    </div>

                </article>

            `,
                    )

                    .join("");
            }

            function searchHymns() {
                const query = document

                    .getElementById("hymnSearch")

                    .value.toLowerCase();

                const cards = document.querySelectorAll(".hymn-card");

                const noResults = document.getElementById("noResults");

                let visibleCount = 0;

                cards.forEach((card) => {
                    const hymnId = card.getAttribute("data-id");

                    const hymnData = hymnDatabase.find((h) => h.id == hymnId);

                    const title = hymnData.title.toLowerCase();

                    const category = hymnData.category.toLowerCase();

                    if (title.includes(query) || category.includes(query)) {
                        card.style.display = "block";

                        card.style.animation = "none";

                        card.offsetHeight;

                        card.style.animation = `fadeInUp 0.4s ease forwards ${visibleCount * 0.05}s`;

                        visibleCount++;
                    } else {
                        card.style.display = "none";
                    }
                });

                noResults.style.display = visibleCount === 0 ? "block" : "none";
            }

            /* =========================================

           3. APP LOGIC & TELEPROMPTER

           ========================================= */

            let activeCard = null;

            const scrollStates = new Map();

            function toggleHymn(el) {
                const card = el.closest(".hymn-card");

                if (activeCard && activeCard !== card) {
                    activeCard.classList.remove("active");

                    stopScroll(activeCard.querySelector(".play-btn"));
                }

                card.classList.toggle("active");

                activeCard = card.classList.contains("active") ? card : null;

                if (activeCard) {
                    setTimeout(() => {
                        const viewport = card.querySelector(".lyrics-viewport");

                        highlightActiveLyric(viewport);

                        const offsetPosition =
                            card.getBoundingClientRect().top +
                            window.pageYOffset -
                            100;

                        window.scrollTo({
                            top: offsetPosition,

                            behavior: "smooth",
                        });
                    }, 300);
                }
            }

            function highlightActiveLyric(viewport) {
                const paragraphs = viewport.querySelectorAll("p");

                const viewportCenter =
                    viewport.scrollTop + viewport.clientHeight / 2.5;

                let closestElement = null;

                let minDistance = Infinity;

                paragraphs.forEach((p) => {
                    p.classList.remove("active-line");

                    const pCenter =
                        p.offsetTop + p.clientHeight / 2 - viewport.offsetTop;

                    const distance = Math.abs(viewportCenter - pCenter);

                    if (distance < minDistance) {
                        minDistance = distance;

                        closestElement = p;
                    }
                });

                if (closestElement) closestElement.classList.add("active-line");
            }

            function toggleScroll(btn) {
                const cardId = btn.closest(".hymn-card").dataset.id;

                const state = scrollStates.get(cardId);

                if (state && state.isActive) stopScroll(btn);
                else startScroll(btn);
            }

            function startScroll(btn) {
                const card = btn.closest(".hymn-card");

                const viewport = card.querySelector(".lyrics-viewport");

                const cardId = card.dataset.id;

                btn.innerHTML = '<i class="fas fa-pause"></i> አቁም';

                btn.classList.add("active");

                const scroll = () => {
                    viewport.scrollTop += 0.6;

                    if (
                        viewport.scrollTop + viewport.clientHeight >=
                        viewport.scrollHeight - 2
                    ) {
                        stopScroll(btn);
                    } else {
                        const state = scrollStates.get(cardId);

                        if (state && state.isActive) {
                            state.animationFrameId =
                                requestAnimationFrame(scroll);
                        }
                    }
                };

                scrollStates.set(cardId, {
                    isActive: true,

                    animationFrameId: requestAnimationFrame(scroll),
                });
            }

            function stopScroll(btn) {
                if (!btn) return;

                const cardId = btn.closest(".hymn-card").dataset.id;

                const state = scrollStates.get(cardId);

                if (state && state.animationFrameId) {
                    cancelAnimationFrame(state.animationFrameId);
                }

                scrollStates.set(cardId, {
                    isActive: false,

                    animationFrameId: null,
                });

                btn.innerHTML = '<i class="fas fa-play"></i> አጫውት';

                btn.classList.remove("active");
            }

            function adjustFont(btn, amount) {
                const viewport = btn

                    .closest(".lyrics-section")

                    .querySelector(".lyrics-viewport");

                const currentSize = parseFloat(
                    window.getComputedStyle(viewport).fontSize,
                );

                const newSize = Math.max(
                    16,

                    Math.min(45, currentSize + amount),
                );

                viewport.style.fontSize = newSize + "px";

                highlightActiveLyric(viewport);
            }

            function jumpToLine(el) {
                const viewport = el.closest(".lyrics-viewport");

                const targetPos =
                    el.offsetTop -
                    viewport.offsetTop -
                    viewport.clientHeight / 2.5 +
                    el.clientHeight / 2;

                viewport.scrollTo({ top: targetPos, behavior: "smooth" });
            }

            document.addEventListener("DOMContentLoaded", () => {
                renderHymns(hymnDatabase);
            });
